name: Notification Service CI

on:
  pull_request:
    branches: [main, develop-python]
    paths:
      - "notification-service/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r notification-service/requirements.txt

      - name: Run tests
        env:
          MONGO_URL: mongodb://localhost:27017
          MONGO_DB: notification_db
          POSTMARK_API_KEY: test-key
          POSTMARK_FROM_EMAIL: test@example.com
        run: |
          cd notification-service
          PYTHONPATH=. pytest -v
