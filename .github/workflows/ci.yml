name: CI/CD - User Service

# Okida se na svaki push i pull request
on:
  push:
  pull_request:

jobs:
  # POSAO 1: pokreni testove
  test:
    name: Testovi
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service-py
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaliraj zavisnosti
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pokreni testove (pytest)
        run: pytest

 # POSAO 2: napravi Docker image i objavi ga na registar (CD)
  build:
    name: Build i objavi Docker image
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write          # dozvola da workflow objavi image na registar
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Prijava na GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build i objavi Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/user-service:latest
          docker build -t "$IMAGE" ./user-service-py
          docker push "$IMAGE"