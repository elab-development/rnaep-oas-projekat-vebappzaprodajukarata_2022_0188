name: Payment Service CI

on:
  pull_request:
    branches: [main, develop-python]
    paths:
      - "payment-service/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r payment-service/requirements.txt

      - name: Run tests
        env:
          DB_USER: testuser
          DB_PASSWORD: testpass
          DB_HOST: localhost
          DB_PORT: 3306
          DB_NAME: payment_db
        run: |
          cd payment-service
          PYTHONPATH=. pytest -v
