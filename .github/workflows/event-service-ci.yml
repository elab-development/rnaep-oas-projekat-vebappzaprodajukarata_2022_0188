name: Event Service CI

on:
  push:
    paths:
      - "event_service/**"
      - ".github/workflows/event-service-ci.yml"
  pull_request:
    paths:
      - "event_service/**"
      - ".github/workflows/event-service-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: event_service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          TESTING: "true"
          DATABASE_URL: "sqlite:///./test_event_service.db"
        run: pytest