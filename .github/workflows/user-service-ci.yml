name: User Service CI

on:
  pull_request:
    branches: [main, develop-python]
    paths:
      - "user-service-py/**"

jobs:
  test:
    name: Testovi
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-service-py
    steps:
      - name: Preuzmi kod
        uses: actions/checkout@v4

      - name: Postavi Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instaliraj zavisnosti
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Pokreni testove (pytest)
        env:
          PYTHONPATH: ".:.."
        run: pytest
