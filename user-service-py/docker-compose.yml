services:
  user-service:
    build: .
    container_name: user-service
    ports:
      - "8001:8001"
    environment:
      DB_HOST: user-db
      DB_PORT: 3306
      DB_DATABASE: users_db
      DB_USERNAME: user_service
      DB_PASSWORD: secret123
      SECRET_KEY: promeni-ovaj-tajni-kljuc-u-produkciji
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
    depends_on:
      user-db:
        condition: service_healthy
    networks:
      - user-network

  user-db:
    image: mysql:8.0
    container_name: user-db
    environment:
      MYSQL_DATABASE: users_db
      MYSQL_USER: user_service
      MYSQL_PASSWORD: secret123
      MYSQL_ROOT_PASSWORD: root123
    ports:
      - "3307:3306"
    volumes:
      - user-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - user-network

volumes:
  user-db-data:

networks:
  user-network:
    driver: bridge
